<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Rlabs — intelligence, verified onchain.</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="../../colors_and_type.css">
  <link rel="stylesheet" href="../../tokens.css">
  <style>
    html, body { margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
  </style>
</head>
<body data-theme="dark">
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="../_shared/Primitives.jsx"></script>
  <script type="text/babel" src="SiteNav.jsx"></script>
  <script type="text/babel" src="Hero.jsx"></script>
  <script type="text/babel" src="FeatureGrid.jsx"></script>
  <script type="text/babel" src="CodeShowcase.jsx"></script>
  <script type="text/babel" src="Footer.jsx"></script>

  <script type="text/babel">
    function App() {
      // force dark for the marketing demo
      React.useEffect(() => { document.documentElement.setAttribute('data-theme', 'dark'); }, []);
      return (
        <div style={{ background: 'var(--bg)', color: 'var(--fg1)', minHeight: '100vh' }}>
          <SiteNav />
          <Hero />
          <FeatureGrid />
          <CodeShowcase />
          <CTABand />
          <Footer />
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
