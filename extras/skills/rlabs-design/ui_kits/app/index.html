<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Rlabs Studio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="../../colors_and_type.css">
  <link rel="stylesheet" href="../../tokens.css">
  <style>
    html, body { margin:0; padding:0; }
    body { background: var(--bg); }
  </style>
</head>
<body data-theme="dark">
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="../_shared/Primitives.jsx"></script>
  <script type="text/babel" src="Sidebar.jsx"></script>
  <script type="text/babel" src="TopBar.jsx"></script>
  <script type="text/babel" src="Overview.jsx"></script>
  <script type="text/babel" src="Agents.jsx"></script>
  <script type="text/babel" src="Transactions.jsx"></script>

  <script type="text/babel">
    const { useState } = React;
    function App() {
      React.useEffect(() => { document.documentElement.setAttribute('data-theme', 'dark'); }, []);
      const [active, setActive] = useState('home');
      const titles = {
        home:     { t: 'overview',      s: 'studio · all agents' },
        agents:   { t: 'agents',        s: 'studio · 12 deployed' },
        txs:      { t: 'transactions',  s: 'studio · last 24h' },
        wallets:  { t: 'wallets',       s: 'studio' },
        chains:   { t: 'chains',        s: 'studio · 7 networks' },
        studio:   { t: 'studio',        s: 'rlabs' },
      };
      const body = {
        home:    <Overview/>,
        agents:  <Agents/>,
        txs:     <Transactions/>,
        wallets: <div style={{padding:32,color:'var(--fg3)'}}><Mono>// wallets view</Mono></div>,
        chains:  <div style={{padding:32,color:'var(--fg3)'}}><Mono>// chains view</Mono></div>,
        studio:  <div style={{padding:32,color:'var(--fg3)'}}><Mono>// studio view</Mono></div>,
      }[active];
      return (
        <div style={{ display: 'flex', background: 'var(--bg)', color: 'var(--fg1)', minHeight: '100vh' }}>
          <Sidebar active={active} onNav={setActive}/>
          <div style={{ flex: 1, minWidth: 0 }}>
            <TopBar title={titles[active].t} subtitle={titles[active].s}/>
            {body}
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
