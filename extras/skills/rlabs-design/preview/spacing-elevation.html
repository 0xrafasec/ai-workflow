<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card" style="padding:0; background:transparent;">
  <div style="display:grid; grid-template-columns: 1fr 1fr; gap:0;">
    <div style="background:#E6E6E1; padding:18px 20px; display:flex; flex-direction:column; gap:14px;">
      <div class="tag">light · elevation</div>
      <div style="display:flex; gap:12px;">
        <div style="width:88px; height:72px; background:#FFF; border:1px solid rgba(0,0,0,0.10); border-radius:8px; box-shadow:0 1px 2px rgba(0,0,0,0.06); display:flex; align-items:flex-end; padding:8px;"><div class="mono" style="color:#0A0A0B;">sh-1</div></div>
        <div style="width:88px; height:72px; background:#FFF; border:1px solid rgba(0,0,0,0.10); border-radius:8px; box-shadow:0 6px 16px rgba(0,0,0,0.12); display:flex; align-items:flex-end; padding:8px;"><div class="mono" style="color:#0A0A0B;">sh-2</div></div>
        <div style="width:88px; height:72px; background:#FFF; border:1px solid rgba(0,0,0,0.10); border-radius:12px; box-shadow:0 16px 40px rgba(0,0,0,0.18); display:flex; align-items:flex-end; padding:8px;"><div class="mono" style="color:#0A0A0B;">sh-3</div></div>
      </div>
    </div>
    <div style="background:#0A0A0B; padding:18px 20px; display:flex; flex-direction:column; gap:14px;">
      <div class="tag" style="color:#8A8A92;">dark · elevation</div>
      <div style="display:flex; gap:12px;">
        <div style="width:88px; height:72px; background:#1C1C1F; border:1px solid rgba(255,255,255,0.10); border-radius:8px; box-shadow:0 2px 6px rgba(0,0,0,0.6); display:flex; align-items:flex-end; padding:8px;"><div class="mono" style="color:#FAFAF7;">sh-1</div></div>
        <div style="width:88px; height:72px; background:#1C1C1F; border:1px solid rgba(255,255,255,0.12); border-radius:8px; box-shadow:0 10px 24px rgba(0,0,0,0.75), 0 0 0 1px rgba(255,255,255,0.04); display:flex; align-items:flex-end; padding:8px;"><div class="mono" style="color:#FAFAF7;">sh-2</div></div>
        <div style="width:88px; height:72px; background:#1C1C1F; border:1px solid rgba(255,255,255,0.14); border-radius:12px; box-shadow:0 24px 56px rgba(0,0,0,0.9), 0 0 0 1px rgba(255,255,255,0.06); display:flex; align-items:flex-end; padding:8px;"><div class="mono" style="color:#FAFAF7;">sh-3</div></div>
      </div>
    </div>
  </div>
</div></body></html>
