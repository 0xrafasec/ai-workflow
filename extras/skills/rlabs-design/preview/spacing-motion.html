<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .stage {
    position: relative;
    height: 82px;
    padding: 0 6px;
    background: linear-gradient(to right, transparent 0, transparent calc(100% - 1px), rgba(0,0,0,0.06) calc(100% - 1px));
    background-size: 10% 100%;
    display: flex;
    align-items: center;
  }
  .track {
    position: relative;
    width: 100%;
    height: 2px;
    background: rgba(0,0,0,0.06);
  }
  .glide {
    position: absolute;
    top: -9px;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: #0A0A0B;
    will-change: transform;
  }
  .glide::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: inherit;
    opacity: 0.22;
    transform: scale(1);
    filter: blur(8px);
  }
  .a1 {
    background: #0A0A0B;
    animation: slide1 3.2s infinite cubic-bezier(0.2, 0.8, 0.2, 1);
  }
  .a2 {
    background: #C6F24E;
    animation: slide1 3.2s infinite cubic-bezier(0.65, 0, 0.35, 1);
  }
  .a3 {
    background: #2E5BFF;
    animation: slide1 3.2s infinite cubic-bezier(0.22, 1, 0.36, 1);
  }
  @keyframes slide1 {
    0%   { transform: translateX(0) scale(1); }
    6%   { transform: translateX(0) scale(1.15); }
    50%  { transform: translateX(calc(100cqw - 20px)) scale(1.15); }
    56%  { transform: translateX(calc(100cqw - 20px)) scale(1); }
    94%  { transform: translateX(0) scale(1); }
    100% { transform: translateX(0) scale(1); }
  }
  .row {
    display: grid;
    grid-template-columns: 160px 1fr;
    align-items: center;
    gap: 14px;
    container-type: inline-size;
  }
  .lab {
    display: flex;
    flex-direction: column;
    gap: 2px;
    font-family: var(--font-mono);
    font-size: 11px;
  }
  .lab b {
    font-family: var(--font-body);
    font-weight: 500;
    font-size: 12px;
    color: var(--fg1);
    text-transform: lowercase;
    letter-spacing: -0.01em;
  }
  .lab span { color: var(--fg3); }
</style>
</head>
<body><div class="card">
  <div class="tag">motion · fluid ease-outs, not linear</div>
  <div style="display:flex; flex-direction:column; gap:10px;">
    <div class="row">
      <div class="lab"><b>rlabs standard</b><span>cubic-bezier(.2, .8, .2, 1)</span></div>
      <div class="stage"><div class="track"></div><div class="glide a1"></div></div>
    </div>
    <div class="row">
      <div class="lab"><b>smooth in-out</b><span>cubic-bezier(.65, 0, .35, 1)</span></div>
      <div class="stage"><div class="track"></div><div class="glide a2"></div></div>
    </div>
    <div class="row">
      <div class="lab"><b>expo out</b><span>cubic-bezier(.22, 1, .36, 1)</span></div>
      <div class="stage"><div class="track"></div><div class="glide a3"></div></div>
    </div>
  </div>
  <div class="mono" style="color:var(--fg3); margin-top:2px;">
    durations · 120 / 200 / 320 / 520ms  ·  animate transform + opacity only
  </div>
</div></body></html>
