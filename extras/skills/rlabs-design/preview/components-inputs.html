<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .field { font-family:var(--font-body); font-size:14px; padding:10px 12px; border-radius:8px; width:100%; box-sizing:border-box; transition: border-color 180ms ease, box-shadow 200ms ease, background 180ms ease; border:1px solid; }
  .l .field:hover { border-color:rgba(0,0,0,0.45); }
  .d .field:hover { border-color:rgba(255,255,255,0.45); background:#222226; }
  .label { font-family:var(--font-body); font-weight:700; font-size:11px; text-transform:uppercase; letter-spacing:0.08em; }
  /* light */
  .l .field { background:#FFF; color:#0A0A0B; border-color:rgba(0,0,0,0.22); }
  .l .field::placeholder { color:#8A8A92; }
  .l .field:focus { outline:none; border-color:#0A0A0B; box-shadow:0 0 0 3px rgba(10,10,11,0.10); }
  .l .label { color:#0A0A0B; }
  /* dark */
  .d .field { background:#1C1C1F; color:#FAFAF7; border-color:rgba(255,255,255,0.22); }
  .d .field::placeholder { color:#8A8A92; }
  .d .field:focus { outline:none; border-color:#FAFAF7; box-shadow:0 0 0 3px rgba(250,250,247,0.12); }
  .d .label { color:#FAFAF7; }
</style>
</head>
<body><div class="card" style="padding:0; background:transparent;">
  <div style="display:grid; grid-template-columns:1fr 1fr; gap:0;">
    <div class="l" style="background:#FAFAF7; padding:18px 20px; display:flex; flex-direction:column; gap:12px;">
      <div class="tag">light · inputs</div>
      <div style="display:flex; flex-direction:column; gap:4px;">
        <div class="label">wallet address</div>
        <input class="field" value="0xA3f9E2c1…aB42" />
      </div>
      <div style="display:flex; flex-direction:column; gap:4px;">
        <div class="label">agent name</div>
        <input class="field" placeholder="e.g. mev-sentry-01" />
      </div>
    </div>
    <div class="d" style="background:#0A0A0B; padding:18px 20px; display:flex; flex-direction:column; gap:12px;">
      <div class="tag" style="color:#8A8A92;">dark · inputs</div>
      <div style="display:flex; flex-direction:column; gap:4px;">
        <div class="label">wallet address</div>
        <input class="field" value="0xA3f9E2c1…aB42" />
      </div>
      <div style="display:flex; flex-direction:column; gap:4px;">
        <div class="label">agent name</div>
        <input class="field" placeholder="e.g. mev-sentry-01" />
      </div>
    </div>
  </div>
</div></body></html>
