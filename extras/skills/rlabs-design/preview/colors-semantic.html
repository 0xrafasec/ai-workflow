<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div class="tag">semantic · status colors</div>
  <div style="display:grid; grid-template-columns: repeat(4, 1fr); gap:8px;">
    <div style="border:1px solid var(--border-subtle); padding:12px; border-radius:8px;"><div style="display:flex; align-items:center; gap:6px;"><div style="width:8px; height:8px; border-radius:50%; background:#A9D638;"></div><span style="font-weight:500;">success</span></div><div class="mono" style="margin-top:6px;">#A9D638</div></div>
    <div style="border:1px solid var(--border-subtle); padding:12px; border-radius:8px;"><div style="display:flex; align-items:center; gap:6px;"><div style="width:8px; height:8px; border-radius:50%; background:#FF5B2E;"></div><span style="font-weight:500;">danger</span></div><div class="mono" style="margin-top:6px;">#FF5B2E</div></div>
    <div style="border:1px solid var(--border-subtle); padding:12px; border-radius:8px;"><div style="display:flex; align-items:center; gap:6px;"><div style="width:8px; height:8px; border-radius:50%; background:#E5A23A;"></div><span style="font-weight:500;">warning</span></div><div class="mono" style="margin-top:6px;">#E5A23A</div></div>
    <div style="border:1px solid var(--border-subtle); padding:12px; border-radius:8px;"><div style="display:flex; align-items:center; gap:6px;"><div style="width:8px; height:8px; border-radius:50%; background:#2E5BFF;"></div><span style="font-weight:500;">info</span></div><div class="mono" style="margin-top:6px;">#2E5BFF</div></div>
  </div>
</div></body></html>
