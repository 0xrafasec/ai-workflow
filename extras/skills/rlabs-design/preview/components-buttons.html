<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .btn { font-family:var(--font-body); font-weight:500; font-size:13px; padding:9px 14px; border-radius:8px; border:1px solid transparent; cursor:pointer; transition: all 200ms cubic-bezier(0.2,0.8,0.2,1); display:inline-flex; align-items:center; gap:6px; white-space:nowrap; }
  .btn:active { transform: scale(0.98); }
  /* light-surface variants */
  .l .btn-primary { background:#0A0A0B; color:#FAFAF7; }
  .l .btn-primary:hover { background:#2A2A2E; }
  .l .btn-signal  { background:#C6F24E; color:#0A0A0B; }
  .l .btn-signal:hover { background:#0A0A0B; color:#FAFAF7; }
  .l .btn-secondary { background:#FFF; color:#0A0A0B; border-color:rgba(0,0,0,0.22); }
  .l .btn-secondary:hover { background:#F2F2EE; border-color:#0A0A0B; }
  .l .btn-ghost { background:transparent; color:#0A0A0B; }
  .l .btn-ghost:hover { background:rgba(0,0,0,0.06); }
  /* dark-surface variants */
  .d .btn-primary { background:#FAFAF7; color:#0A0A0B; }
  .d .btn-primary:hover { background:#FFFFFF; box-shadow:0 4px 14px rgba(250,250,247,0.2); }
  .d .btn-signal  { background:#C6F24E; color:#0A0A0B; }
  .d .btn-signal:hover { background:#0A0A0B; color:#FAFAF7; box-shadow:0 0 0 1px #C6F24E; }
  .d .btn-secondary { background:transparent; color:#FAFAF7; border-color:rgba(255,255,255,0.28); }
  .d .btn-secondary:hover { background:rgba(255,255,255,0.06); border-color:#FAFAF7; }
  .d .btn-ghost { background:transparent; color:#FAFAF7; }
  .d .btn-ghost:hover { background:rgba(255,255,255,0.08); }
</style>
</head>
<body><div class="card" style="padding:0; background:transparent;">
  <div style="display:grid; grid-template-columns:1fr 1fr; gap:0;">
    <div class="l" style="background:#FAFAF7; padding:16px 18px; display:flex; flex-direction:column; gap:12px;">
      <div class="tag">light · buttons</div>
      <div style="display:flex; gap:8px; flex-wrap:wrap;">
        <button class="btn btn-primary">deploy agent →</button>
        <button class="btn btn-signal">ship to mainnet</button>
        <button class="btn btn-secondary">cancel</button>
        <button class="btn btn-ghost">learn more</button>
      </div>
    </div>
    <div class="d" style="background:#0A0A0B; padding:16px 18px; display:flex; flex-direction:column; gap:12px;">
      <div class="tag" style="color:#8A8A92;">dark · buttons</div>
      <div style="display:flex; gap:8px; flex-wrap:wrap;">
        <button class="btn btn-primary">deploy agent →</button>
        <button class="btn btn-signal">ship to mainnet</button>
        <button class="btn btn-secondary">cancel</button>
        <button class="btn btn-ghost">learn more</button>
      </div>
    </div>
  </div>
</div></body></html>
